[platformio]
src_dir = src/esp32-c3
core_dir = C:/.pio

[env:esp32-c3]
platform = espressif32@6.10.0
board = esp32-c3-devkitm-1
framework = arduino

build_flags =
  -std=gnu++17
build_unflags =
  -std=gnu++11

lib_deps =
  links2004/WebSockets@^2.4.1
  bblanchon/ArduinoJson@^7.1.0

monitor_speed = 115200
upload_speed = 115200